<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summarizer - Chatbot</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1e293b; font-size: 24px; text-align: center; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; resize: vertical; box-sizing: border-box; font-size: 16px; }
        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        input[type="password"] { padding: 10px; border: 1px solid #cbd5e1; border-radius: 5px; flex-grow: 1; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        #output { margin-top: 25px; padding: 20px; border-left: 5px solid var(--primary); background: #f1f5f9; white-space: pre-wrap; display: none; }
        .loader { display: none; text-align: center; margin-top: 10px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 Résumeur d'IA Universel</h1>
    <p>Collez n'importe quel texte (article, cours, rapport) ci-dessous :</p>
    
    <textarea id="sourceText" placeholder="Entrez votre texte ici..."></textarea>
    
    <div class="controls">
        <input type="password" id="apiKey" placeholder="Collez votre clé API OpenAI (sk-...)">
        <button onclick="processSummary()">Résumer</button>
    </div>

    <div class="loader" id="loader">⚡ Analyse et résumé en cours...</div>
    <div id="output"></div>
</div>

<script>
    async function processSummary() {
        const text = document.getElementById('sourceText').value;
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!text || !key) {
            alert("Veuillez remplir le texte ET la clé API !");
            return;
        }

        // Interface utilisateur
        loader.style.display = "block";
        output.style.display = "none";

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // Modèle rapide, intelligent et moins cher
                    messages: [
                        { role: "system", content: "Tu es un expert en synthèse. Résume le texte suivant de manière structurée avec des points clés si nécessaire." },
                        { role: "user", content: "Voici le texte à résumer : \n\n" + text }
                    ],
                    temperature: 0.5
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            output.innerText = data.choices[0].message.content;
            output.style.display = "block";
        } catch (error) {
            alert("Erreur : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
