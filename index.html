<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Résumé Local (Sans Clé)</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: #2c3e50; font-size: 20px; text-align: center; }
        textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; margin-top: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #95a5a6; }
        #status { font-size: 12px; color: #7f8c8d; margin-top: 10px; text-align: center; }
        #output { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 8px; display: none; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h1>🤖 Résumeur IA Sans Clé</h1>
    <p style="font-size: 13px; color: #666;">Note : Le premier chargement peut prendre 30 secondes car l'IA se télécharge dans votre navigateur.</p>
    
    <textarea id="inputText" placeholder="Collez votre texte ici..."></textarea>
    <button id="summarizeBtn">Résumer le texte</button>
    
    <div id="status">Chargement du moteur d'IA...</div>
    <div id="output"></div>
</div>

<script type="module">
    // Importation de la bibliothèque d'IA sans clé
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const btn = document.getElementById('summarizeBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const input = document.getElementById('inputText');

    let summarizer;

    // Initialisation de l'IA au chargement de la page
    async function init() {
        try {
            status.innerText = "Téléchargement de l'IA (une seule fois)...";
            summarizer = await pipeline('summarization', 'Xenova/distilbart-cnn-6-6');
            status.innerText = "IA prête ! ✅";
            btn.disabled = false;
        } catch (e) {
            status.innerText = "Erreur de chargement. Vérifiez votre connexion.";
        }
    }
    init();

    btn.onclick = async () => {
        if (!input.value) return;
        
        btn.disabled = true;
        status.innerText = "Résumé en cours... (calculé par votre ordinateur)";
        
        const result = await summarizer(input.value, {
            max_new_tokens: 100
        });

        output.innerText = result[0].summary_text;
        output.style.display = "block";
        status.innerText = "Terminé !";
        btn.disabled = false;
    };
</script>

</body>
</html>
